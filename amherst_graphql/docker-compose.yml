services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: gql_lakebase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d

  api:
    build: .
    ports:
      - "5000:8080"
    environment:
      Postgres__ConnectionString: "Host=db;Port=5432;Database=gql_lakebase;SearchPath=public,sandbox;Username=postgres;Password=postgres"
    depends_on:
      - db

volumes:
  pgdata:
